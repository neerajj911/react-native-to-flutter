buildscript {
    ext.kotlin_version = '1.9.0'
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    namespace 'com.mysdk'
    compileSdk 34

    defaultConfig {
        minSdk 21
        targetSdk 34
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}

// ---------------------------------------------------------------------------
// AAR resolution
//
// flutter_aar/ holds a local Maven repo with the Flutter embedding AAR.
// It must be present before the library compiles. We try, in order:
//   1. Use it if it already exists (release tarball ships it pre-staged).
//   2. Otherwise build it from the sibling flutter_sdk module (monorepo case).
//   3. Otherwise fail with a helpful message.
// ---------------------------------------------------------------------------
def flutterAarDir = file("$projectDir/flutter_aar")
def flutterModuleDir = file("$projectDir/../../flutter_sdk")
def flutterBin = System.getenv('FLUTTER_BIN') ?: 'flutter'

task ensureFlutterAar {
    doLast {
        def populated = flutterAarDir.exists() && (flutterAarDir.list()?.length ?: 0) > 0
        if (populated) return

        if (!flutterModuleDir.exists()) {
            throw new GradleException(
                "Flutter AAR repo missing at ${flutterAarDir} and the Flutter module " +
                "was not found at ${flutterModuleDir}. Install rn-flutter-sdk from a " +
                "release tarball (which ships the AAR), or place it next to flutter_sdk."
            )
        }

        logger.lifecycle("Flutter AAR not found — building it from ${flutterModuleDir}")
        exec {
            workingDir flutterModuleDir
            commandLine flutterBin, 'pub', 'get'
        }
        exec {
            workingDir flutterModuleDir
            commandLine flutterBin, 'build', 'aar', '--no-profile', '--no-debug'
        }
        flutterAarDir.mkdirs()
        copy {
            from "$flutterModuleDir/build/host/outputs/repo"
            into flutterAarDir
        }
    }
}

afterEvaluate {
    preBuild.dependsOn ensureFlutterAar
}

repositories {
    google()
    mavenCentral()
    maven {
        url "$projectDir/flutter_aar"
    }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
    implementation 'com.facebook.react:react-native:+'

    // Flutter embedding — resolved from flutter_aar/ (auto-built above when missing).
    implementation 'com.example.flutter_sdk:flutter_release:1.0'
}
