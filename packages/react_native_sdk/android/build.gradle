buildscript {
    ext.kotlin_version = '1.9.0'
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    namespace 'com.mysdk'
    compileSdk 34

    defaultConfig {
        minSdk 21
        targetSdk 34
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}

// ---------------------------------------------------------------------------
// Version: read from the wrapper's package.json so the AAR coordinate always
// matches the npm package version (single source of truth).
// ---------------------------------------------------------------------------
def sdkVersion = '0.0.0'
def packageJsonFile = file("$projectDir/../package.json")
if (packageJsonFile.exists()) {
    def matcher = packageJsonFile.text =~ /"version"\s*:\s*"([^"]+)"/
    if (matcher.find()) sdkVersion = matcher.group(1)
}
logger.lifecycle("rn-flutter-sdk resolving Flutter AAR version ${sdkVersion}")

repositories {
    google()
    mavenCentral()

    // Flutter engine binaries (flutter_embedding_release, arm64_v8a_release, etc.)
    // are hosted here by Google. Required because our AAR has transitive deps on them.
    maven {
        url 'https://storage.googleapis.com/download.flutter.io'
    }

    // Primary: public Maven repo published by CI to the gh-pages branch.
    maven {
        url 'https://neerajj911.github.io/react-native-to-flutter/maven'
    }

    // Fallback: locally staged AAR repo (for monorepo dev).
    maven {
        url "$projectDir/flutter_aar"
    }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
    implementation 'com.facebook.react:react-native:+'

    // Flutter embedding — resolved from gh-pages first, local fallback second.
    implementation "com.example.flutter_sdk:flutter_release:${sdkVersion}"
}
